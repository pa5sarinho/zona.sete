<html>
    <head>
		<meta charset="UTF-8">
		<script type="module" src="./scripts/playground.js"></script>
    </head>
    <style>
    	@font-face
		{
			font-family: jetBrainsMono;
			src: url("./ui/JetBrainsMono-Medium.woff2");
		}

		:root {
		  --background: #FDF9ED;
		  --foreground: #0e0e0e;
		  --supporting-color: #01178e;
		  --danger: #992e2e;
		  --caution: #F2854A;
		  --pastel-supporting-color: #5986b2;
		  --bright-supporting-color: #0145f2;
		  --cool-background: #EDF1F5;
		  --offwhite: #cebe93;
		}
    
        h2, h3
        {
            width: fit-content;
        }

        .importante {
        	background-color: var(--background);
        	color: var(--supporting-color);
        }
        
        .destaque 
        {
            background-color: var(--supporting-color);
            color: var(--background);
        }

        .alerta {
           	background-color: var(--caution);
            color: var(--danger);
        }
        
        .perigo
        {
            background-color: var(--danger);
            color: var(--caution);
        }

        .destaque-light {
        	background-color: var(--bright-supporting-color);
        	color: var(--background);
        }
        
        .texto
        {
            margin: 0px;
            padding: 0 5px 0 5px;
            overflow: hidden;
        }
        
        p {
        	color: var(--foreground);
        }
        
        a {
            color: var(--supporting-color);
            font-weight: bold;
        }
        
        html, body
        {
            background-color: var(--background);
            font-family: jetBrainsMono;
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            line-height: 30px;
            user-select: none;
        }
        
        .wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 1920px;
            height: 1080px;
            background-color: var(--background);
        }
        
        .game-ui {
            aspect-ratio: 16 / 9;
            width: 100%;
            max-height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .wrapper {
            transform: translate(-50%, -50%) scale(1);
			cursor: url("assets/sprites/cursor1.png"), default;
        }
        
        .main-screen {
			padding: 30px;
        }
        
    	.map-layer, .foreground-layer, .simulation-layer, .ui-layer {
    	    position: absolute;
    	    align-items: center;
    	    justify-content: center;
    	    font-size: 20px;
    	}

		/*-----------------------------------------------------------------------------*/
    	/*--------------------------------- MAP LAYER ---------------------------------*/
		/*-----------------------------------------------------------------------------*/

    	.map-layer {
    	    z-index: -1;
    	    color: rgb(63, 63, 63);
    	    width: 100%;
    	    height: 100%;
    	    display: flex;
			top: 0px;
			right: 0px;
    	}

		#light {
			pointer-events: none;
		}

    	.grid-row {
    	    display: flex;
    	    flex-wrap: nowrap;
    	}
    	
    	.grid-item {
    	    display: flex;
    	    position: absolute;
    	    align-items: center;
    	    justify-content: center;
    	    /* outline: 1px solid rgba(128, 128, 128, 0.3); */
    	    font-weight: bold;
    	    background-size: cover;
			background-position: bottom;
			/* background-clip: content-box; */
    	    /*image-rendering: pixelated; */
    	    /* transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); */
    	}

    	.grid-item:hover {
    		opacity: 1;
    		/* outline: 2px solid var(--background); */
    		transform: translateY(-3px);
    	}

    	.click-item {
    	    display: flex;
    	    position: absolute;
    	    align-items: center;
    	    justify-content: center;
    	    background-size: cover;
    	    /* transform: rotateX(60deg) rotateY(0deg) rotateZ(-45deg); */
    	}
    	
		/*----------------------------------------------------------------------------*/
        /*--------------------------------- UI LAYER ---------------------------------*/
		/*----------------------------------------------------------------------------*/

		.ui-layer {
	   		z-index: 1;
		}

		.ui-header {
			background-image: linear-gradient(to right, var(--supporting-color), var(--pastel-supporting-color));
			color: var(--background);
			height: 30px;
			width: inherit;
			padding: 0 10px 0 10px;
		}

		.game-header {
			display: flex;
			width: 1860px;
		}

		.interactable {
			cursor: url("assets/sprites/cursor1_dark.png"), pointer;
		}

		#general-info {
			display: flex;
			width: 480px;
			background-color: var(--background);
		}

		#degrees {
			width: 60px;
			text-align: center;
		}

		#place {
			width: 210px;
			text-align: center;
		}

		#time {
			width: 150px;
			text-align: center;
			color: var(--danger);
		}

		#button1 {
			width: 120px;
			text-align: center;
		}

		#button2 {
			width: 150px;
			text-align: center;
		}

		#button3 {
			width: 150px;
			text-align: center;
		}

		#character-info-row {
			background-color: var(--offwhite);
			position: fixed;
			right: 60px;
			width: 600px;
		}

		.character-info {
			text-align: center;
		}

		#hp-area {
			color: var(--danger);
			display: flex;
		}

		#HP {
			width: 60px;
		}

		#hunger-area {
			display: flex;
		}

		.icone30px {
			width: 30px;
			height: 30px;
			text-align: center;
		}

		.open-section {
			text-decoration: underline;
		}

		#sticky-window {
			position: absolute;
			display: none;
			height: 390px;
			width: 900px;
			top: 30px;
			right: 0px;
			background-color: var(--background);
		}

		#window-popup {
			z-index: 4;
			background-color: var(--background);
			border: 4px double var(--supporting-color);
		}

		.drop-down-menu {
			z-index: 3;
			position: absolute;
			background-color: var(--supporting-color);
			border: 4px double var(--bright-supporting-color);
		}

		.drop-down-menu-item {
			padding: 0 0 0 5px;
			overflow-wrap: break-word;
			color: var(--background);
		}

		.drop-down-menu-item:hover {
			background-color: var(--background);
			color: var(--supporting-color);
		}

		.drop-down-menu-item:not(:last-child) {
			border-bottom: 1px solid var(--pastel-supporting-color); 
		}

		.event-log {
			width: 540px;
			background-color: var(--background);
			position: absolute;
		}

		#lower-log {
			display: flex;
			height: 60px;
			bottom: -990px;
		}

		#expanded-log {
			z-index: 2;
			display: none;
			height: 780px;
			bottom: -930px;
		}

		.portrait {
			height: 60px;
			width: 60px;
		}

		.log-text {
			text-overflow: ellipsis;
		}

		.expand-minimize-button {
			height: 30px;
			width: 30px;
			position: absolute;
			text-align: center;
			background-color: var(--supporting-color);
			color: var(--background);
		}

		.close-button {
			background-color: var(--danger);
		}

		#log-minimize {
			right: 0px;
			top: 0px;
		}

		#log-expand {
			right: 0px;
			bottom: 0px;
		}

		#char-expand {
			right: 0px;
			top: 0px;
		}

		#char-minimize {
			display: none;
			z-index: 2;
			right: 0px;
			top: 0px;
		}

		.portrait-list {
			display: flex;
			position: absolute;
		}

		#smaller-p-list {
			height: 60px;
			bottom: -990px;
			right: 60px;
			width: 1260px;
		}

		#full-p-list {
			bottom: -930px;
			right: 0px;
			display: none;
			height: 540px;
			width: 1320px;
		}

		#group-expand {
			bottom: -990px;
			right: 0px;
			height: 60px;
			width: 60px;
		}

		.solid-border {
			background-color: var(--background);
			position: absolute;
		}

		/*----------------------------------------------------------------*/
		/*---- CALCULOS DE TRADUÇÃO DE 1080P PARA DIVERSAS RESOLUÇÕES ----*/
		/*----------------------------------------------------------------*/
    	
    	/* 720p */
        @media (max-width: 1539px) or (max-height: 839px){
            .wrapper {
                transform: translate(-50%, -50%) scale(0.6666);
            }
        }

        /* 900p */
        @media ((min-width: 1540px) and (max-width: 1860px)) or ((min-height: 840px) and (max-height: 1020px)){
            .wrapper {
                transform: translate(-50%, -50%) scale(0.8333);
            }
        }

        /* 1440p */
        @media (min-width: 2500px) and (max-width: 3779px) and (min-height: 1380px){
            .wrapper {
                transform: translate(-50%, -50%) scale(1.3333);
            }
        }
        /* 4K */
        @media (min-width: 3780px) {
            .wrapper {
                transform: translate(-50%, -50%) scale(2);
            }
        }

		/*-------------------------------------------------------*/
		/* FERRAMENTAS DE DESENVOLVIMENTO/TESTE/DEBUG (GOD MODE) */
		/*-------------------------------------------------------*/

		#command-line-wrapper {
			position: absolute;
			font-size: 13px;
			bottom: 0px;
			height: 30px;
			width: 1860px;
			display: flex;
		}

        #command-line {
        	height: 30px;
        	width: 540px;
			position: relative;
			font-size: 20px;
			top: -1px;
        	resize: none;
        	background-color: var(--supporting-color);
        	color: var(--background);
        	outline: none;
        	border: 4px double var(--pastel-supporting-color);
        }

        .dev-ui {
        	height: 30px;
        	width: 120px;
			border-radius: 0px;
			bottom: 0px;
			background-color: var(--supporting-color);
        	color: var(--background);
        	outline: none;
        	border: 4px double var(--pastel-supporting-color);
        	font-family: jetBrainsMono;
        	align-items: center;
        }

		.dev-ui-alerta {
        	height: 30px;
        	width: 120px;
			border-radius: 0px;
			bottom: 0px;
			background-color: var(--caution);
            color: var(--danger);
        	outline: none;
        	border: 4px double var(--danger);
        	font-family: jetBrainsMono;
        	align-items: center;
        }

        button.dev-ui:hover {
        	background-color: var(--bright-supporting-color);
        }

        button.dev-ui:active {
			background-color: var(--supporting-color);
			border: 4px double var(--supporting-color);;
		}

		#g {
			background: url("./assets/map/1/0.png");
		}

		#s {
			background: url("./assets/map/1/6.png");
		}

    </style>
    <body>
        <div class="wrapper" id="wrapper">
            <div class="main-screen">
				<canvas class='map-layer' id="grid" width="1920" height="1080"></canvas>
            	<canvas class='map-layer' id='map' width="1920" height="1080"></canvas>
				<canvas class='map-layer' id='light' width="1920" height="1080"></canvas>
         	    <div class="ui-layer" id="ui">
         	    	<div class="game-header">
	         	    	<div id="general-info">
							<div id="season" class="icone30px">🌡️</div>
							<div id="weather" class="icone30px">⛅</div>
							<div id="degrees">32°C</div>
							<div id="time"></div>
							<div id="place"></div>
	         	    	</div>
						<div id="character-info-row">
							<div id="hp-area">
								<div class="icone30px character-info">♥</div>
								<div class="character-info" id="HP"></div>
							</div>
							<div id="hunger-area">
								<div class="icone 30px character-info"></div>
								<div class="character-info" id="hunger"></div>
							</div>
						</div>
						<div class="expand-minimize-button interactable" id="char-expand">▼</div>
						<div class="expand-minimize-button interactable" id="char-minimize">▲</div>
         	    	</div>
         	    	<div id="sticky-window"></div>
	                <div class="event-log" id="expanded-log">
	                	<div class="ui-header texto">Registro de eventos</div>
						<div class="expand-minimize-button interactable" id="log-minimize">▼</div>
	                </div>
	                <div class="event-log" id="lower-log">
						<img src="assets/portraits/kitten.png" class="portrait">
						<p class="texto log-text"><a>Xena</a>: que infortunio! Todo o peixe acabou e vamos todos morrer de fome antes da seca</p>
						<div class="expand-minimize-button interactable" id="log-expand">▲</div>
	                </div>
	                <div class="portrait-list" id="smaller-p-list"></div>
	                <!-- <div class="expand-minimize-button interactable" id="group-expand">...</div> -->
	                <div class="portrait-list" id="full-p-list"></div>
            	</div>
            	<div id="command-line-wrapper">
					<textarea id="command-line" rows="1"></textarea>
					<button class="dev-ui map-editor interactable">modo editor</button>
					<div id="map-editor-menu" style="display: none;">
						<button class="dev-ui interactable" id="g" style="width: 30px;"></button>
						<button class="dev-ui interactable" id="s" style="width: 30px;"></button>

						<button class="dev-ui interactable" id="l1" style="width: 30px;">1</button>
						<button class="dev-ui interactable" id="l2" style="width: 30px;">2</button>
						<button class="dev-ui interactable" id="l3" style="width: 30px;">3</button>
					</div>
					<!-- <div class="filler" style="width: 1040px;"></div> -->
					<div class="dev-ui" id="fps-wrapper" style="display: flex; height: 22px; width: 60px;">
						<div style="width: 35px; padding-left: 3px;">fps: </div>
						<div id="fps"></div>
					</div>
					<div class="dev-ui" style="display: flex; height: 22px; width: 90px;">
						<div style="width: 50px; padding-left: 4px;">zoom: </div>
						<div id="zoom">1.00</div>
					</div>
					<button class="dev-ui download-map interactable" style="right: 0px">baixar mapa</button>
            	</div>
        	</div>
       	</div>
    </body>
</html>
